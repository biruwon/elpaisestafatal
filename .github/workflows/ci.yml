name: Validate

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type and Astro checks
        run: npm run check

      - name: Validate local-runtime contract
        run: npm run container:validate

      - name: Validate claim and knowledge contracts
        run: |
          npm run validate:content
          npm run knowledge:validate
          npm run knowledge:metrics
          npm run knowledge:refresh:validate
          npm run knowledge:handlers
          npm run knowledge:fallback-compiler
          npm run knowledge:discovery
          npm run knowledge:warehouse
          npm run knowledge:warehouse:query
          npm run knowledge:answer-plan
          npm run knowledge:evidence-packet
          npm run knowledge:materialization-candidates:validate

      - name: Build public site and audit public surface
        run: npm run build

      - name: Validate request lifecycle and static fallback contracts
        run: |
          npm run claim-input:lifecycle
          npm run audit:roadmap

      - name: Smoke-test local text and media boundary without inference
        run: |
          OLLAMA_ENDPOINT=http://127.0.0.1:1 LOCAL_CLASSIFIER_PORT=8906 node scripts/local-claim-service.mjs > /tmp/local-claim-service.log 2>&1 &
          service_pid=$!
          trap 'kill "$service_pid" 2>/dev/null || true' EXIT
          for attempt in $(seq 1 20); do
            if curl --fail --silent http://127.0.0.1:8906/healthz > /dev/null; then break; fi
            sleep 0.25
          done
          SMOKE_RESOLVE_BASE_URL=http://127.0.0.1:8906 SMOKE_RESOLVE_PATH=/v1/resolve SMOKE_MEDIA=1 npm run smoke:local-resolver

      - name: Check whitespace and repository state
        run: git diff --check
